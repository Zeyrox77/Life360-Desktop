name: Build Windows Executable

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build executable
        run: pyinstaller Life360.spec --noconfirm --clean

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Life360-windows
          path: dist/Life360.exe

      # Tag push (e.g. v1.0.0) -> versioned release.
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Life360.exe
          name: Life360 ${{ github.ref_name }}
          generate_release_notes: true

      # Push to main -> keep a rolling "latest" release with the newest exe,
      # always downloadable at /releases/download/latest/Life360.exe
      - name: Publish latest build
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Life360.exe
          tag_name: latest
          name: Latest build
          prerelease: true
          body: Automatically built from the latest commit on main.
